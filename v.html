<script>
// إنشاء كانفس تلقائيًا وإضافته للصفحة
const canvas = document.createElement('canvas');
document.body.appendChild(canvas);
const ctx = canvas.getContext('2d');

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    canvas.style.display = 'block';
    canvas.style.position = 'fixed';
    canvas.style.top = '0';
    canvas.style.left = '0';
    canvas.style.zIndex = '-1';
    canvas.style.backgroundColor = 'black';
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// إعداد النجوم
const stars = [];
const numStars = 150; // كثافة أقل

for (let i = 0; i < numStars; i++) {
    stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        speed: Math.random() * 1 + 0.2, // حركة بطيئة
        radius: Math.random() * 1.5 + 0.5, // حجم النجمة
        alpha: 1 // لون أبيض كامل بدون شفافية
    });
}

// رسم النجوم
function drawStars() {
    ctx.fillStyle = 'black';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    stars.forEach(star => {
        ctx.fillStyle = `rgba(255, 255, 255, ${star.alpha})`; // أبيض واضح
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
        ctx.fill();
    });
}

// تحديث النجوم لتتحرك من الأسفل إلى الأعلى
function updateStars() {
    stars.forEach(star => {
        star.y -= star.speed;
        if (star.y < 0) {
            star.y = canvas.height;
            star.x = Math.random() * canvas.width;
            star.speed = Math.random() * 1 + 0.2;
            star.radius = Math.random() * 1.5 + 0.5;
            star.alpha = 1;
        }
    });
}


function animate() {
    drawStars();
    updateStars();
    requestAnimationFrame(animate);
}

animate();

</script>
